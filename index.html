<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>UNBREAKABLE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap');

  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --card: #1c1c1c;
    --accent: #e63c2f;
    --accent2: #ff6b35;
    --rest: #2563eb;
    --text: #f0f0f0;
    --muted: #666;
    --border: #2a2a2a;
    --green: #22c55e;
    --safe: env(safe-area-inset-bottom, 20px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: -webkit-fill-available;
    overflow-x: hidden;
  }

  /* ---- SCREENS ---- */
  .screen { display: none; min-height: 100vh; }
  .screen.active { display: flex; flex-direction: column; }

  /* ---- HOME ---- */
  #home {
    background: var(--bg);
  }

  .home-header {
    background: linear-gradient(160deg, #1a0505 0%, #0a0a0a 60%);
    padding: 60px 24px 32px;
    position: relative;
    overflow: hidden;
  }

  .home-header::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(230,60,47,0.2) 0%, transparent 70%);
    pointer-events: none;
  }

  .logo {
    font-family: 'Bebas Neue', cursive;
    font-size: 52px;
    letter-spacing: 4px;
    color: var(--text);
    line-height: 1;
  }

  .logo span { color: var(--accent); }

  .tagline {
    font-size: 13px;
    color: var(--muted);
    margin-top: 6px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .session-grid {
    padding: 20px 16px;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding-bottom: calc(var(--safe) + 20px);
  }

  .session-btn {
    aspect-ratio: 1;
    border-radius: 12px;
    background: var(--card);
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Bebas Neue', cursive;
    font-size: 22px;
    color: var(--muted);
    position: relative;
    overflow: hidden;
  }

  .session-btn.completed {
    background: rgba(34,197,94,0.1);
    border-color: rgba(34,197,94,0.3);
    color: var(--green);
  }

  .session-btn.completed::after {
    content: '✓';
    position: absolute;
    top: 3px; right: 5px;
    font-size: 9px;
    color: var(--green);
    font-family: sans-serif;
  }

  .session-btn:active {
    transform: scale(0.93);
    background: rgba(230,60,47,0.15);
    border-color: var(--accent);
    color: var(--text);
  }

  .section-label {
    padding: 8px 16px 0;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
  }

  /* ---- SESSION INFO ---- */
  #session-info {
    background: var(--bg);
  }

  .session-header {
    padding: 54px 20px 20px;
    background: linear-gradient(160deg, #1a0505 0%, #0a0a0a 80%);
    position: relative;
  }

  .back-btn {
    position: absolute;
    top: 56px; left: 20px;
    background: rgba(255,255,255,0.07);
    border: none;
    color: var(--text);
    width: 38px; height: 38px;
    border-radius: 10px;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }

  .session-title {
    font-family: 'Bebas Neue', cursive;
    font-size: 42px;
    letter-spacing: 3px;
    padding-top: 12px;
  }

  .session-type-badge {
    display: inline-block;
    background: rgba(230,60,47,0.15);
    border: 1px solid rgba(230,60,47,0.3);
    color: var(--accent);
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 20px;
    margin-top: 6px;
    font-weight: 600;
  }

  .session-desc {
    margin: 16px 20px;
    background: var(--card);
    border-radius: 14px;
    padding: 16px;
    font-size: 14px;
    line-height: 1.6;
    color: #bbb;
    border: 1px solid var(--border);
  }

  .exercise-list {
    padding: 0 16px;
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 100px;
  }

  .exercise-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .exercise-item.is-rest {
    background: rgba(37,99,235,0.08);
    border-color: rgba(37,99,235,0.2);
  }

  .ex-num {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: rgba(230,60,47,0.15);
    border: 1px solid rgba(230,60,47,0.3);
    color: var(--accent);
    font-size: 12px;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .is-rest .ex-num {
    background: rgba(37,99,235,0.15);
    border-color: rgba(37,99,235,0.3);
    color: var(--rest);
  }

  .ex-info { flex: 1; min-width: 0; }
  .ex-name { font-size: 15px; font-weight: 500; }
  .ex-detail { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .ex-video-btn {
    background: rgba(255,255,255,0.07);
    border: none;
    color: var(--muted);
    width: 32px; height: 32px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    text-decoration: none;
  }

  .block-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    padding: 12px 4px 4px;
    font-weight: 600;
  }

  .start-btn {
    position: fixed;
    bottom: calc(var(--safe) + 16px);
    left: 16px; right: 16px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 16px;
    padding: 18px;
    font-family: 'Bebas Neue', cursive;
    font-size: 22px;
    letter-spacing: 3px;
    cursor: pointer;
    box-shadow: 0 8px 32px rgba(230,60,47,0.4);
  }

  /* ---- WORKOUT ---- */
  #workout {
    background: var(--bg);
    position: relative;
  }

  .workout-top {
    padding: 52px 20px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .progress-bar-wrap {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .step-counter {
    font-size: 13px;
    color: var(--muted);
    white-space: nowrap;
  }

  .workout-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 0 20px;
    justify-content: center;
    min-height: 0;
  }

  .exercise-card {
    background: var(--card);
    border-radius: 24px;
    padding: 28px 24px;
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }

  .exercise-card.is-rest-card {
    background: rgba(37,99,235,0.06);
    border-color: rgba(37,99,235,0.2);
  }

  .exercise-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--accent);
    border-radius: 24px 24px 0 0;
  }

  .is-rest-card::before {
    background: var(--rest);
  }

  .card-block-info {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .card-ex-name {
    font-family: 'Bebas Neue', cursive;
    font-size: 42px;
    letter-spacing: 2px;
    line-height: 1.1;
    color: var(--text);
    margin-bottom: 4px;
  }

  .is-rest-card .card-ex-name {
    color: #93c5fd;
  }

  .card-detail {
    font-size: 18px;
    color: var(--accent);
    font-weight: 700;
    margin-bottom: 20px;
  }

  .is-rest-card .card-detail {
    color: var(--rest);
  }

  /* Timer ring */
  .timer-ring-wrap {
    display: flex;
    justify-content: center;
    margin: 8px 0 20px;
  }

  .timer-ring {
    position: relative;
    width: 140px; height: 140px;
  }

  .timer-ring svg {
    transform: rotate(-90deg);
    position: absolute; top: 0; left: 0;
  }

  .timer-ring-text {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Bebas Neue', cursive;
    font-size: 52px;
    letter-spacing: 2px;
    color: var(--text);
  }

  .timer-ring-text.rest-color { color: #93c5fd; }

  .video-link {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--muted);
    text-decoration: none;
    font-size: 13px;
    margin-bottom: 20px;
  }

  .video-link:active { background: rgba(255,255,255,0.1); }

  .workout-actions {
    padding: 0 20px;
    padding-bottom: calc(var(--safe) + 16px);
    display: flex;
    gap: 10px;
  }

  .btn-next {
    flex: 1;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 16px;
    padding: 18px;
    font-family: 'Bebas Neue', cursive;
    font-size: 22px;
    letter-spacing: 3px;
    cursor: pointer;
    box-shadow: 0 6px 24px rgba(230,60,47,0.35);
  }

  .btn-next.rest-btn {
    background: var(--rest);
    box-shadow: 0 6px 24px rgba(37,99,235,0.35);
  }

  .btn-skip {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 16px;
    padding: 18px 20px;
    font-size: 22px;
    cursor: pointer;
  }

  /* ---- DONE ---- */
  #done {
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 24px;
  }

  .done-icon {
    font-size: 80px;
    margin-bottom: 20px;
  }

  .done-title {
    font-family: 'Bebas Neue', cursive;
    font-size: 54px;
    letter-spacing: 4px;
    color: var(--green);
  }

  .done-sub {
    font-size: 16px;
    color: var(--muted);
    margin-top: 8px;
    line-height: 1.5;
  }

  .done-actions {
    margin-top: 40px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
    max-width: 320px;
  }

  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 16px;
    padding: 16px;
    font-size: 16px;
    cursor: pointer;
  }

  /* Swipe hint */
  .swipe-hint {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    padding: 8px 0 0;
  }

  /* Pause overlay */
  .pause-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
  }

  .pause-overlay.visible { display: flex; }
  .pause-title { font-family: 'Bebas Neue', cursive; font-size: 48px; letter-spacing: 4px; }
  
  .btn-resume {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 16px;
    padding: 16px 48px;
    font-family: 'Bebas Neue', cursive;
    font-size: 24px;
    letter-spacing: 3px;
    cursor: pointer;
  }

  .btn-quit {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 16px;
    padding: 14px 48px;
    font-size: 16px;
    cursor: pointer;
  }

  /* Pulse animation for rest */
  @keyframes pulse-rest {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  .pulsing { animation: pulse-rest 2s ease-in-out infinite; }
</style>
</head>
<body>

<!-- HOME SCREEN -->
<div id="home" class="screen active">
  <div class="home-header">
    <div class="logo">UN<span>BREAK</span>ABLE</div>
    <div class="tagline">50 sesiones · Tu cuerpo, tu escudo</div>
  </div>
  <div class="section-label">Selecciona sesión</div>
  <div class="session-grid" id="session-grid">
    <!-- populated by JS -->
  </div>
</div>

<!-- SESSION INFO SCREEN -->
<div id="session-info" class="screen">
  <div class="session-header">
    <button class="back-btn" onclick="showHome()">←</button>
    <div class="session-title" id="info-title">SESIÓN 1</div>
    <div class="session-type-badge" id="info-badge">General</div>
  </div>
  <div class="session-desc" id="info-desc"></div>
  <div class="exercise-list" id="info-exercises"></div>
  <button class="start-btn" onclick="startWorkout()">COMENZAR ENTRENO</button>
</div>

<!-- WORKOUT SCREEN -->
<div id="workout" class="screen">
  <div class="workout-top">
    <button class="back-btn" style="position:relative;top:auto;left:auto;" onclick="showPause()">⏸</button>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="workout-progress"></div>
    </div>
    <div class="step-counter" id="step-counter">1 / 10</div>
  </div>
  
  <div class="workout-body">
    <div class="exercise-card" id="exercise-card">
      <div class="card-block-info" id="card-block-info">BLOQUE 1 · SET 1</div>
      <div class="card-ex-name" id="card-ex-name">Flexión</div>
      <div class="card-detail" id="card-detail">15 reps</div>
      
      <div class="timer-ring-wrap" id="timer-wrap" style="display:none">
        <div class="timer-ring">
          <svg width="140" height="140" viewBox="0 0 140 140">
            <circle cx="70" cy="70" r="62" fill="none" stroke="#2a2a2a" stroke-width="6"/>
            <circle cx="70" cy="70" r="62" fill="none" stroke="#e63c2f" stroke-width="6"
              stroke-dasharray="389.6" stroke-dashoffset="0"
              id="timer-circle" stroke-linecap="round"/>
          </svg>
          <div class="timer-ring-text" id="timer-text">0</div>
        </div>
      </div>
      
      <a class="video-link" id="video-link" href="#" target="_blank">
        <span>▶</span> Ver video del ejercicio
      </a>
    </div>
    <div class="swipe-hint">Toca SIGUIENTE cuando termines</div>
  </div>
  
  <div class="workout-actions">
    <button class="btn-skip" onclick="prevStep()">←</button>
    <button class="btn-next" id="btn-next" onclick="nextStep()">SIGUIENTE</button>
  </div>
</div>

<!-- DONE SCREEN -->
<div id="done" class="screen">
  <div class="done-icon">🏆</div>
  <div class="done-title">¡COMPLETADO!</div>
  <div class="done-sub" id="done-sub">Sesión 1 finalizada.<br>¡Eres imparable!</div>
  <div class="done-actions">
    <button class="start-btn" style="position:relative;bottom:auto;left:auto;right:auto;" onclick="showHome()">VOLVER AL INICIO</button>
    <button class="btn-outline" onclick="restartSession()">REPETIR SESIÓN</button>
  </div>
</div>

<!-- PAUSE OVERLAY -->
<div class="pause-overlay" id="pause-overlay">
  <div class="pause-title">PAUSA</div>
  <button class="btn-resume" onclick="resumeWorkout()">▶ CONTINUAR</button>
  <button class="btn-quit" onclick="quitWorkout()">Abandonar sesión</button>
</div>

// ==================== STATE ====================
let currentSession = null;
let currentStep = 0;
let timerInterval = null;
let timerLeft = 0;
let completed = JSON.parse(localStorage.getItem('ub_completed') || '[]');

// ==================== AUDIO (no interrumpe música) ====================
let audioCtx = null;
let audioUnlocked = false;

function unlockAudio() {
  if (audioUnlocked) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    // Reproducir un buffer vacío — esto desbloquea el contexto en iOS
    const buf = audioCtx.createBuffer(1, 1, 22050);
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    src.connect(audioCtx.destination);
    src.start(0);
    audioCtx.resume().then(() => { audioUnlocked = true; });
  } catch(e) {}
}

// Desbloquear en cualquier toque
document.addEventListener('touchend', unlockAudio, { once: true });

function beep(freq, duration, volume = 0.35, type = 'sine') {
  if (!audioCtx) return;
  try {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(0, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(volume, audioCtx.currentTime + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + duration + 0.05);
  } catch(e) {}
}

// Pitido suave a 10s (tono medio)
function beepWarning() {
  beep(880, 0.15, 0.3);
}

// Pitidos de cuenta atrás 3, 2, 1 (tono agudo)
function beepCountdown() {
  beep(1100, 0.12, 0.35);
}

// Pitido final (doble tono — fin del ejercicio)
function beepEnd() {
  beep(1047, 0.1, 0.4);
  setTimeout(() => beep(1319, 0.18, 0.4), 120);
}

// ==================== UTILS ====================
function formatTime(s) {
  if (s >= 60) return Math.floor(s/60) + ':' + String(s%60).padStart(2,'0');
  return s + 's';
}

function getSessionType(session) {
  const desc = session.desc.toLowerCase();
  if (desc.includes('flow')) return 'Flow';
  if (desc.includes('fuerza')) return 'Fuerza';
  if (desc.includes('potencia')) return 'Potencia';
  if (desc.includes('metabólica') || desc.includes('metabolica')) return 'Metabólica';
  return 'General';
}

// ==================== HOME ====================
function buildHome() {
  const grid = document.getElementById('session-grid');
  grid.innerHTML = '';
  for (let i = 1; i <= 50; i++) {
    const btn = document.createElement('button');
    btn.className = 'session-btn' + (completed.includes(i) ? ' completed' : '');
    btn.textContent = i;
    btn.onclick = () => showSessionInfo(i);
    grid.appendChild(btn);
  }
}

function showHome() {
  showScreen('home');
  buildHome();
  stopTimer();
}

// ==================== SESSION INFO ====================
function showSessionInfo(num) {
  currentSession = { num, data: SESSIONS[String(num)] };
  const s = currentSession.data;
  
  document.getElementById('info-title').textContent = 'SESIÓN ' + num;
  document.getElementById('info-badge').textContent = getSessionType(s);
  document.getElementById('info-desc').textContent = s.desc;
  
  // Build exercise list
  const list = document.getElementById('info-exercises');
  list.innerHTML = '';
  
  let lastBlock = null;
  s.ex.forEach((ex, i) => {
    if (ex.b !== lastBlock) {
      lastBlock = ex.b;
      const label = document.createElement('div');
      label.className = 'block-label';
      label.textContent = 'BLOQUE ' + ex.b;
      list.appendChild(label);
    }
    
    const isRest = ex.n === 'Descanso';
    const item = document.createElement('div');
    item.className = 'exercise-item' + (isRest ? ' is-rest' : '');
    
    let detail = '';
    if (ex.t > 0 && ex.r > 0) detail = ex.t + 's · ' + ex.r + ' reps';
    else if (ex.t > 0) detail = formatTime(ex.t);
    else if (ex.r > 0) detail = ex.r + (ex.r === 1 ? ' vez' : ' reps');
    if (ex.st > 0) detail += ' · ⏱ ' + formatTime(ex.st);
    
    item.innerHTML = `
      <div class="ex-num">${i+1}</div>
      <div class="ex-info">
        <div class="ex-name">${ex.n}</div>
        <div class="ex-detail">${detail}</div>
      </div>
      ${ex.v ? `<a class="ex-video-btn" href="${ex.v}" target="_blank">▶</a>` : ''}
    `;
    list.appendChild(item);
  });
  
  showScreen('session-info');
}

// ==================== WORKOUT ====================
function startWorkout() {
  unlockAudio();
  currentStep = 0;
  showScreen('workout');
  renderStep();
}

function renderStep() {
  const steps = currentSession.data.ex;
  const step = steps[currentStep];
  const isRest = step.n === 'Descanso';
  const total = steps.length;
  
  // Progress
  document.getElementById('workout-progress').style.width = ((currentStep / total) * 100) + '%';
  document.getElementById('step-counter').textContent = (currentStep + 1) + ' / ' + total;
  
  // Card
  const card = document.getElementById('exercise-card');
  card.className = 'exercise-card' + (isRest ? ' is-rest-card' : '');
  
  // Block info
  document.getElementById('card-block-info').textContent = `BLOQUE ${step.b} · SET ${step.s}`;
  
  // Name
  document.getElementById('card-ex-name').textContent = step.n;
  
  // Detail
  let detail = '';
  if (step.t > 0 && step.r > 0) detail = `${step.t}s · ${step.r} reps`;
  else if (step.t > 0) detail = formatTime(step.t);
  else if (step.r > 0) detail = step.r + (step.r === 1 ? ' repetición' : ' repeticiones');
  else detail = '—';
  if (step.st > 0) detail += `  ·  ⏱ Bloque: ${formatTime(step.st)}`;
  document.getElementById('card-detail').textContent = detail;
  
  // Video link
  const vlink = document.getElementById('video-link');
  if (step.v) {
    vlink.href = step.v;
    vlink.style.display = 'flex';
  } else {
    vlink.style.display = 'none';
  }
  
  // Timer / button
  const btnNext = document.getElementById('btn-next');
  const timerWrap = document.getElementById('timer-wrap');
  
  stopTimer();
  
  if (step.t > 0) {
    // Timed step
    timerWrap.style.display = 'flex';
    const circle = document.getElementById('timer-circle');
    const timerText = document.getElementById('timer-text');
    const circumference = 389.6;
    
    circle.style.stroke = isRest ? '#2563eb' : '#e63c2f';
    timerText.className = 'timer-ring-text' + (isRest ? ' rest-color' : '');
    
    timerLeft = step.t;
    timerText.textContent = formatTime(timerLeft);
    circle.style.strokeDashoffset = 0;
    
    if (isRest) {
      card.classList.add('pulsing');
    }
    
    timerInterval = setInterval(() => {
      timerLeft--;
      timerText.textContent = formatTime(timerLeft);
      const offset = circumference * (1 - timerLeft / step.t);
      circle.style.strokeDashoffset = offset;

      // Pitidos
      if (timerLeft === 10 && step.t > 12) {
        beepWarning();
      } else if (timerLeft === 3 || timerLeft === 2 || timerLeft === 1) {
        beepCountdown();
        if (navigator.vibrate) navigator.vibrate(40);
      }

      if (timerLeft <= 0) {
        stopTimer();
        beepEnd();
        if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
        setTimeout(() => nextStep(), 400);
      }
    }, 1000);
    
    btnNext.textContent = 'SALTAR';
    btnNext.className = 'btn-next' + (isRest ? ' rest-btn' : '');
  } else {
    // Reps step
    timerWrap.style.display = 'none';
    card.classList.remove('pulsing');
    btnNext.textContent = isRest ? 'LISTO' : 'SIGUIENTE';
    btnNext.className = 'btn-next' + (isRest ? ' rest-btn' : '');
  }
}

function nextStep() {
  unlockAudio();
  stopTimer();
  const steps = currentSession.data.ex;
  if (currentStep < steps.length - 1) {
    currentStep++;
    renderStep();
    // Haptic
    if (navigator.vibrate) navigator.vibrate(30);
  } else {
    finishWorkout();
  }
}

function prevStep() {
  stopTimer();
  if (currentStep > 0) {
    currentStep--;
    renderStep();
  }
}

function stopTimer() {
  if (timerInterval) {
    clearInterval(timerInterval);
    timerInterval = null;
  }
  const card = document.getElementById('exercise-card');
  if (card) card.classList.remove('pulsing');
}

function finishWorkout() {
  stopTimer();
  const num = currentSession.num;
  if (!completed.includes(num)) {
    completed.push(num);
    localStorage.setItem('ub_completed', JSON.stringify(completed));
  }
  document.getElementById('done-sub').textContent = `Sesión ${num} completada.\n¡Eres imparable!`;
  showScreen('done');
}

function restartSession() {
  startWorkout();
}

// ==================== PAUSE ==================== 
function showPause() {
  document.getElementById('pause-overlay').classList.add('visible');
  stopTimer();
}

function resumeWorkout() {
  document.getElementById('pause-overlay').classList.remove('visible');
  // Re-render to restart timer if timed
  renderStep();
}

function quitWorkout() {
  document.getElementById('pause-overlay').classList.remove('visible');
  stopTimer();
  showHome();
}

// ==================== SCREEN MANAGER ====================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

// ==================== INIT ====================
buildHome();
</script>
